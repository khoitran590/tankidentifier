# Tank Identifier — iOS (Capacitor + Next.js)
# Codemagic: select branch → "Check for configuration file" → run "Tank Identifier iOS"
# Setup: docs/CODEMAGIC.md

workflows:
  tank-identifier-ios:
    name: Tank Identifier iOS
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      # Codemagic → Team integrations → Developer Portal → App Store Connect API key
      app_store_connect: codemagic # TODO: change to your integration name
    environment:
      ios_signing:
        distribution_type: development # change to app_store for TestFlight
        bundle_identifier: com.tankidentifier.app
      vars:
        XCODE_PROJECT: "App.xcodeproj"
        XCODE_SCHEME: "App"
        # Optional for TestFlight auto-publish (numeric Apple ID from App Store Connect)
        APP_STORE_APP_ID: 0
      node: 20
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: master
          include: true
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Build Next.js static export for Capacitor
        script: npm run build:mobile
      - name: Sync web assets to iOS
        script: npx cap sync ios
      - name: Set up code signing on Xcode project
        script: xcode-project use-profiles
      - name: Increment build number
        script: |
          cd "$CM_BUILD_DIR/ios/App"
          agvtool new-version -all "$(($BUILD_NUMBER))"
          agvtool new-marketing-version "1.0.$(($BUILD_NUMBER))"
      - name: Build IPA
        script: |
          cd "$CM_BUILD_DIR/ios/App"
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - user@example.com # TODO: your email
        notify:
          success: true
          failure: true

  # TestFlight / App Store — run manually after development builds work
  tank-identifier-ios-app-store:
    name: Tank Identifier iOS (App Store)
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic # TODO: your integration name
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tankidentifier.app
      vars:
        XCODE_PROJECT: "App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_STORE_APP_ID: 0 # TODO: required for TestFlight publish
      node: 20
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Build Next.js static export for Capacitor
        script: npm run build:mobile
      - name: Sync web assets to iOS
        script: npx cap sync ios
      - name: Set up code signing on Xcode project
        script: xcode-project use-profiles
      - name: Increment build number from App Store Connect
        script: |
          cd "$CM_BUILD_DIR/ios/App"
          LATEST=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APP_ID" || echo 0)
          agvtool new-version -all $((LATEST + 1))
          agvtool new-marketing-version "1.0.$((LATEST + 1))"
      - name: Build IPA
        script: |
          cd "$CM_BUILD_DIR/ios/App"
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - user@example.com # TODO: your email
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - App testers # TODO: your TestFlight group name(s)
